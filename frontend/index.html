<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIKit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside class="sidebar" aria-label="侧边导航">
    <div class="sidebar-header">
      <span class="logo-dot" aria-hidden="true"></span>
      <span class="logo">AIKit</span>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav" aria-label="主导航"></nav>
    <div class="sidebar-footer">
      <span class="muted" id="repo-count">—</span>
      <div class="footer-actions">
        <button type="button" class="icon-btn" id="theme-toggle" aria-label="切换深色/浅色主题" title="切换主题"></button>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="toolbar" id="toolbar"></header>
    <div class="content" id="content"></div>
    <footer class="statusbar">
      <span id="status-text">就绪</span>
    </footer>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal" id="modal"></div>
  </div>
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
